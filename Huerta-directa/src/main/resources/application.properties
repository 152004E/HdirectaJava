# =========================================================
# PROYECTO: Huerta Directa
# Framework: Spring Boot
# Entorno actual: Desarrollo local + preparación para Railway
# =========================================================



# =========================================================
# DATABASE CONFIGURATION
# =========================================================

# Conexión principal a PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/huerta_directa}

# Usuario de base de datos
spring.datasource.username=${DB_USER:postgres}

# Contraseńa de base de datos
spring.datasource.password=${DB_PASSWORD:12345}

# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver



# =========================================================
# CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# =========================================================

spring.application.name=Huerta-directa



# =========================================================
# CONFIGURACIÓN JPA / HIBERNATE
# =========================================================

# Actualiza automáticamente las tablas según las entidades
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Formatea el SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Manejo de objetos grandes (LOB)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Evita problemas de metadata en algunos servidores
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false



# =========================================================
# CONFIGURACIÓN THYMELEAF
# =========================================================

# Desactiva caché para desarrollo (permite ver cambios sin reiniciar)
spring.thymeleaf.cache=false

# Ubicación de las plantillas HTML
spring.thymeleaf.prefix=classpath:/templates/

# Extensión por defecto
spring.thymeleaf.suffix=.html

# Modo de renderizado
spring.thymeleaf.mode=HTML

# Nivel de log para depuración de Thymeleaf
logging.level.org.thymeleaf=TRACE



# =========================================================
# CONFIGURACIÓN DE SUBIDA DE ARCHIVOS
# =========================================================

# Carpeta donde se guardan las imágenes subidas
# En Linux (Railway) se usa /tmp
upload.path=/tmp/uploads

# Tamańo máximo por archivo
spring.servlet.multipart.max-file-size=10MB

# Tamańo máximo por request
spring.servlet.multipart.max-request-size=10MB



