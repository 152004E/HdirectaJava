# ================= Database Configuration =================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/huerta_directa}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.application.name=Huerta-directa

# ================= JPA Configuration =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ================= Thymeleaf Configuration =================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
logging.level.org.thymeleaf=TRACE

# ================= File Upload Configuration =================
upload.path=/tmp/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= MercadoPago Configuration =================
mercadopago.access_token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.public_key=${MERCADOPAGO_PUBLIC_KEY}
mercadopago.success_url=${MERCADOPAGO_SUCCESS_URL:http://localhost:8085/payment/success}
mercadopago.failure_url=${MERCADOPAGO_FAILURE_URL:http://localhost:8085/payment/failure}
mercadopago.pending_url=${MERCADOPAGO_PENDING_URL:http://localhost:8085/payment/pending}
mercadopago.notification.url=${MERCADOPAGO_NOTIFICATION_URL:http://localhost:8085/api/notifications}

# ================= Server & App URLs =================
server.port=${PORT:8080}
app.base.url=${APP_BASE_URL:http://localhost:8085}